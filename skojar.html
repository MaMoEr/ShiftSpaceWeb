<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skojar — ShiftSpace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-main:    #282E45;
      --color-accent:  #ECB200;
      --color-black:   #090D16;
      --color-white:   #EEF0F3;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--color-black);
      color: var(--color-white);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 10vw;
      border-bottom: 1px solid rgba(238, 240, 243, 0.07);
      flex-shrink: 0;
    }

    .topbar a {
      color: rgba(238, 240, 243, 0.5);
      font-size: 0.85rem;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      padding-bottom: 1px;
      transition: color 120ms ease, border-color 120ms ease;
    }

    .topbar a:hover {
      color: var(--color-accent);
      border-bottom-color: var(--color-accent);
    }

    .topbar a:focus-visible {
      color: var(--color-accent);
      border-bottom-color: var(--color-accent);
      outline: 2px solid var(--color-accent);
      outline-offset: 3px;
    }

    .content {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 10vw;
    }

    .project {
      display: flex;
      flex-direction: column;
      gap: 32px;
      width: 100%;
    }

    .project__header {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .project__icon {
      width: 64px;
      height: 64px;
      background: var(--color-main);
      border: 1px solid rgba(236, 178, 0, 0.3);
      border-radius: 14px;
      flex-shrink: 0;
    }

    .project__name {
      font-family: "Inter", sans-serif;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--color-white);
      line-height: 1.1;
    }

    .project__description {
      font-size: 1rem;
      color: rgba(238, 240, 243, 0.45);
      margin-top: 6px;
    }

    .project__screenshots {
      width: 100%;
      height: 200px;
      background: var(--color-main);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(238, 240, 243, 0.25);
      font-size: 0.9rem;
    }

    .project__cta {
      display: inline-block;
      background: rgba(236, 178, 0, 0.1);
      border: 1px solid rgba(236, 178, 0, 0.4);
      border-radius: 6px;
      padding: 10px 20px;
      color: var(--color-accent);
      font-size: 0.9rem;
      text-decoration: none;
      transition: background 120ms ease;
    }

    .project__cta:hover {
      background: rgba(236, 178, 0, 0.18);
    }

    .project__cta:focus-visible {
      background: rgba(236, 178, 0, 0.18);
      outline: 2px solid var(--color-accent);
      outline-offset: 3px;
    }

    @media (max-width: 600px) {
      .content {
        padding: 0 6vw;
      }

      .project__header {
        flex-wrap: wrap;
      }

      .project__screenshots {
        height: 140px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a href="index.html">← ShiftSpace</a>
  </header>
  <main class="content">
    <div class="project">
      <div class="project__header">
        <div class="project__icon"></div>
        <div>
          <h1 class="project__name">Skojar</h1>
          <p class="project__description">[ App description ]</p>
        </div>
      </div>
      <div class="project__screenshots">[ Screenshots ]</div>
      <a class="project__cta" href="#">App Store — coming soon</a>
    </div>
  </main>
</body>
</html>
